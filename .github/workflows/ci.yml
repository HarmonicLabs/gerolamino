name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    container: ghcr.io/harmoniclabs/gerolamino-ci:latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Flake check (formatter, deploy schema, NixOS config)
        run: nix flake check --no-build

  test:
    runs-on: ubuntu-latest
    container: ghcr.io/harmoniclabs/gerolamino-ci:latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bunx --bun vitest run

  build:
    needs: [check, test]
    runs-on: ubuntu-latest
    container: ghcr.io/harmoniclabs/gerolamino-ci:latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Build WASM packages
        run: |
          nix build -L .#wasm-plexer
          nix build -L .#wasm-utils

      - name: Build TypeScript packages
        run: nix build -L .#ts-packages

      - name: Build bootstrap server
        run: nix build -L .#bootstrap-app

      - name: Build bootstrap container image
        run: nix build -L .#bootstrap-image

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    container: ghcr.io/harmoniclabs/gerolamino-ci:latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Setup SSH key
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVKEY }}" > /root/.ssh/deploy_key
          chmod 600 /root/.ssh/deploy_key
          ssh-keyscan -p 2222 decentralizationmaxi.io >> /root/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy with deploy-rs
        env:
          NIX_SSHOPTS: "-p 2222 -i /root/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
        run: |
          nix run github:serokell/deploy-rs -- \
            --skip-checks \
            --ssh-opts="-p 2222 -i /root/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            .#production

      - name: Verify deployment
        run: |
          ssh -p 2222 -i /root/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            root@decentralizationmaxi.io \
            "nixos-version && systemctl status podman-bootstrap.service --no-pager || true"
