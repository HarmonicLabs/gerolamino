name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Flake check
        run: nix flake check --no-build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Install Bun
        run: nix profile install nixpkgs#bun
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run unit tests
        run: bunx --bun vitest run

  build-and-push:
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Build WASM packages
        run: |
          nix build -L .#wasm-plexer
          nix build -L .#wasm-utils

      - name: Build TypeScript packages
        run: nix build -L .#ts-packages

      - name: Build bootstrap server
        run: nix build -L .#bootstrap-app

      - name: Build bootstrap container image
        run: nix build -L .#bootstrap-image

      - name: Push container to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          IMAGE_STREAM=$(nix build .#bootstrap-image --print-out-paths --no-link)
          "$IMAGE_STREAM" | skopeo copy \
            docker-archive:/dev/stdin \
            docker://ghcr.io/harmoniclabs/bootstrap:latest

