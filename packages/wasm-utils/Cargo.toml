[workspace]
members = [".", "pallas-crypto-patched", "pallas-math", "amaru-vrf-dalek", "amaru-curve25519-dalek"]
resolver = "2"

[package]
name = "wasm-utils"
version = "0.1.0"
edition = "2021"
description = "WASM utility bindings for Cardano primitives (Pallas crypto, addresses, and more)"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Patched pallas-crypto with std::fs gated behind cfg(not(wasm32)) for KES support
pallas-crypto = { path = "./pallas-crypto-patched", features = ["kes"] }
pallas-addresses = "=1.0.0-alpha.6"
pallas-codec = "=1.0.0-alpha.6"
# VRF threshold math (FixedDecimal with 34-decimal precision, exp_cmp)
pallas-math = { path = "./pallas-math" }
# VRF proof verification (ECVRF-ED25519-SHA512-Elligator2, from Amaru)
vrf_dalek = { package = "amaru-vrf-dalek", path = "./amaru-vrf-dalek" }

wasm-bindgen = "0.2"
js-sys = "0.3"
hex = "0.4"
# WASM-compatible RNG — need both v0.2 (for our code) and v0.3 (for rand/ed25519-dalek via KES)
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
getrandom = { version = "0.3", features = ["wasm_js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "z"
lto = true
strip = true
